airflowVersion: "3.2.0"

fernetKey: 
webserverSecretKey: 
executor: CeleryExecutor

defaultAirflowRepository: deathsamsul/airflow-worker
defaultAirflowTag: "3.2.1"
defaultAirflowPullPolicy: IfNotPresent

airflowHome: /opt/airflow

postgresql:
  enabled: false

redis:
  enabled: true
  persistence:
    enabled: false

dagProcessor:
  enabled: true
  replicas: 1

apiServer:
  replicas: 1
  startupProbe:
    failureThreshold: 30
    periodSeconds: 10
    timeoutSeconds: 20

scheduler:
  replicas: 1

workers:
  celery:
    replicas: 1
    extraEnv:
      - name: AIRFLOW__CELERY__WORKER_CONCURRENCY
        value: "1"

    logGroomerSidecar:
      enabled: false

# workers:
#   celery:
#     replicas: 1
#     extraEnv:
#       - name: AIRFLOW__CELERY__WORKER_CONCURRENCY
#         value: "1"  # Adjust based on your needs and resources
#     logGroomer:
#       enabled: false

triggerer:
  enabled: false
  

flower:
  enabled: false



env:

  - name: AIRFLOW__CORE__DAGS_FOLDER
    value: /opt/airflow/app/repo/app/airflow_dags

  - name: AIRFLOW__CORE__LOAD_EXAMPLES
    value: "False"

  - name: PYTHONPATH
    value: /opt/airflow/app/repo:/opt/airflow
    
  - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN_ASYNC
    value: postgresql+asyncpg://airflow:airflowl123@postgres-cluster-rw.database.svc.cluster.local:5432/airflow_db

  - name: AWS_ACCESS_KEY_ID
    value: minioadmin

  - name: AWS_SECRET_ACCESS_KEY
    value: minioadmin123

  - name: TRAINING_DATA_STORE_URL
    value: postgresql+psycopg2://training_user:train123@postgres-cluster-rw.database.svc.cluster.local:5432/appdata

  - name: MLFLOW_S3_ENDPOINT_URL
    value: http://minio.mlops.svc.cluster.local:9000

  - name: MLFLOW_TRACKING_URI
    value: http://mlflow.mlflow.svc.cluster.local:5000

dags:
  mountPath: /opt/airflow/app
  persistence:
    enabled: false
  gitSync:
    enabled: true
    repo: https://github.com/deathsamsul/Autonomous_Fraud_Detection_Agent.git
    branch: main
    ref: main
    rev: HEAD
    depth: 1
    period: 10s

data:
  metadataConnection:
    user: airflow
    pass: airflowl123
    protocol: postgresql
    host: postgres-cluster-rw.database.svc.cluster.local
    port: 5432
    db: airflow_db