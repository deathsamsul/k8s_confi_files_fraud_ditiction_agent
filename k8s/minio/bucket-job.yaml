apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-bucket
  namespace: mlops
spec:
  template:
    spec:
      restartPolicy: OnFailure    # Restart the job if it fails
      containers:
        - name: create-bucket
          image: minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              until mc alias set minio http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                echo "Waiting for MinIO..."
                sleep 5
              done

              mc mb --ignore-existing minio/mlflow
              mc anonymous set none minio/mlflow
              echo "Bucket mlflow is ready"
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_PASSWORD