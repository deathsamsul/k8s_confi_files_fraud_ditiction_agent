apiVersion: v1
kind: Pod
metadata:
  name: dataset-copy-pod
  namespace: fraud-mlops
spec:
  restartPolicy: Never
  containers:
    - name: copy
      image: busybox
      command: ["sleep", "3600"]
      volumeMounts:
        - name: dataset
          mountPath: /opt/datasets
  volumes:
    - name: dataset
      persistentVolumeClaim:
        claimName: fraud-dataset-pvc