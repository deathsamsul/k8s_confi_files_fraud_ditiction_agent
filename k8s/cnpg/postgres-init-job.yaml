apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-init-job
  namespace: database
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: postgres-init
          image: postgres:17
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-admin-secret
                  key: password
          command: ["bash", "-c"]
          args:
            - |
              set -e

              echo "Waiting for PostgreSQL..."
              until pg_isready -h postgres-cluster-rw -p 5432 -U postgres; do
                sleep 2
              done

              echo "Creating databases and users..."
              psql -h postgres-cluster-rw -U postgres -d postgres <<'SQL'
              SELECT 'CREATE DATABASE appdata'
              WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'appdata')\gexec

              SELECT 'CREATE DATABASE mlflowdb'
              WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'mlflowdb')\gexec

              SELECT 'CREATE DATABASE airflow_db'
              WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'airflow_db')\gexec

              DO $do$
              BEGIN
                IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'training_user') THEN
                  CREATE USER training_user WITH PASSWORD 'train123';
                END IF;

                IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'prediction_user') THEN
                  CREATE USER prediction_user WITH PASSWORD 'predict123';
                END IF;

                IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'metrics') THEN
                  CREATE USER metrics WITH PASSWORD 'metrics123';
                END IF;

                IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'mlflow') THEN
                  CREATE USER mlflow WITH PASSWORD 'mlflow1';
                END IF;

                IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'airflow') THEN
                  CREATE USER airflow WITH PASSWORD 'airflowl123';
                END IF;
              END
              $do$;

              GRANT CONNECT ON DATABASE appdata TO training_user;
              GRANT CONNECT ON DATABASE appdata TO prediction_user;
              GRANT CONNECT ON DATABASE appdata TO metrics;

              GRANT ALL PRIVILEGES ON DATABASE mlflowdb TO mlflow;
              GRANT ALL PRIVILEGES ON DATABASE airflow_db TO airflow;
              SQL

              echo "Creating appdata tables..."
              psql -h postgres-cluster-rw -U postgres -d appdata <<'SQL'
              CREATE EXTENSION IF NOT EXISTS pgcrypto;
              CREATE EXTENSION IF NOT EXISTS vector;

              CREATE TABLE IF NOT EXISTS fraud_training_data (
                merchant TEXT,
                category TEXT,
                amt NUMERIC(12,2),
                gender TEXT,
                city TEXT,
                state TEXT,
                zip TEXT,
                lat DOUBLE PRECISION,
                long DOUBLE PRECISION,
                city_pop BIGINT,
                job TEXT,
                unix_time BIGINT,
                merch_lat DOUBLE PRECISION,
                merch_long DOUBLE PRECISION,
                trans_date_trans_time TIMESTAMP,
                dob DATE,
                actual_label INTEGER CHECK (actual_label IN (0,1))
              );

              CREATE TABLE IF NOT EXISTS transactions_predictions (
                transaction_id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
                timestamp TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                fraud_probability DOUBLE PRECISION,
                prediction INTEGER CHECK (prediction IN (0,1)),
                actual_label INTEGER CHECK (actual_label IN (0,1)),
                merchant TEXT,
                category TEXT,
                amt NUMERIC(12,2),
                gender TEXT,
                city TEXT,
                state TEXT,
                zip TEXT,
                lat DOUBLE PRECISION,
                long DOUBLE PRECISION,
                city_pop BIGINT,
                job TEXT,
                unix_time BIGINT,
                merch_lat DOUBLE PRECISION,
                merch_long DOUBLE PRECISION,
                trans_date_trans_time TIMESTAMP,
                dob DATE
              );

              GRANT USAGE ON SCHEMA public TO training_user;
              GRANT SELECT, INSERT, UPDATE, DELETE, TRUNCATE ON fraud_training_data TO training_user;

              GRANT USAGE ON SCHEMA public TO prediction_user;
              GRANT SELECT, INSERT, UPDATE ON transactions_predictions TO prediction_user;

              GRANT USAGE, CREATE ON SCHEMA public TO metrics;
              SQL

              echo "Granting mlflow schema permissions..."
              psql -h postgres-cluster-rw -U postgres -d mlflowdb <<'SQL'
              GRANT USAGE, CREATE ON SCHEMA public TO mlflow;
              SQL

              echo "Granting airflow schema permissions..."
              psql -h postgres-cluster-rw -U postgres -d airflow_db <<'SQL'
              GRANT USAGE, CREATE ON SCHEMA public TO airflow;
              SQL

              echo "PostgreSQL initialization completed."


              